<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Humaniser Studio</title>
  <style>
    :root {
      --bg: #09101d;
      --panel: #111a2e;
      --text: #edf2fb;
      --muted: #a5b2c9;
      --accent: #4f7cff;
      --border: #26365e;
      --good: #6ee7b7;
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top left, rgba(79, 124, 255, 0.08), transparent), var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      padding: 40px 15px;
      line-height: 1.5;
    }

    .container { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 20px; }

    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    header h1 { margin: 0; font-size: 1.5rem; letter-spacing: -0.03em; }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    }

    textarea {
      width: 100%;
      min-height: 220px;
      background: #0d1427;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      padding: 16px;
      font-size: 1rem;
      font-family: inherit;
      line-height: 1.6;
      resize: vertical;
      outline: none;
    }
    textarea:focus { border-color: var(--accent); }

    .main-controls {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 15px;
    }

    select, input[type="text"] {
      background: #0d1427;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 10px;
      font: inherit;
    }

    button#humaniseBtn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      flex-grow: 1;
    }

    button#humaniseBtn:disabled { opacity: 0.6; cursor: wait; }

    /* Advanced Settings Drawer */
    details { margin-top: 10px; }
    summary { cursor: pointer; color: var(--muted); font-size: 0.85rem; padding: 5px; width: fit-content; }
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      padding: 15px 0;
      border-top: 1px solid var(--border);
      margin-top: 10px;
    }
    .setting-item { display: flex; flex-direction: column; gap: 6px; font-size: 0.8rem; }
    label { color: var(--muted); }

    /* Results Area */
    .tabs { display: flex; gap: 10px; margin-bottom: 12px; }
    .tab-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .tab-btn.active { background: rgba(79, 124, 255, 0.15); color: var(--text); border-color: var(--accent); }

    .diff {
      white-space: pre-wrap;
      background: #0d1427;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      min-height: 220px;
    }
    .diff ins { background: rgba(110, 231, 183, 0.15); color: #6ee7b7; text-decoration: none; border-radius: 4px; padding: 0 2px; }
    .diff del { background: rgba(251, 113, 133, 0.15); color: #fb7185; text-decoration: line-through; border-radius: 4px; padding: 0 2px; }

    .status-bar { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--muted); margin-top: 12px; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Humaniser</h1>
      <div id="statusLine" style="font-size: 0.8rem; color: var(--muted);">Ready</div>
    </header>

    <main class="card">
      <textarea id="inputText" placeholder="Paste text to rewrite..."></textarea>
      
      <div class="main-controls">
        <select id="modeSelect" style="flex-shrink: 0; min-width: 120px;">
          <option value="formal">Formal</option>
          <option value="business">Business</option>
          <option value="academic">Academic</option>
          <option value="casual">Casual</option>
        </select>
        <button id="humaniseBtn">Humanise Text</button>
      </div>

      <details>
        <summary>Advanced Settings & API</summary>
        <div class="settings-grid">
          <div class="setting-item">
            <label>Plainness: <span id="plainnessVal">72</span>%</label>
            <input id="plainness" type="range" min="0" max="100" value="72" />
          </div>
          <div class="setting-item">
            <label>Hype reduction: <span id="hypeVal">80</span>%</label>
            <input id="hype" type="range" min="0" max="100" value="80" />
          </div>
          <div class="setting-item">
            <label>Worker Endpoint</label>
            <input id="workerEndpoint" type="text" placeholder="https://..." value="https://humaniser-api.d-chiu.workers.dev/api/humanise" />
          </div>
          <div class="setting-item">
            <label>Model</label>
            <select id="modelSelect">
              <option value="openrouter/free">openrouter/free</option>
              <option value="meta-llama/llama-3.2-3b-instruct:free">Llama 3.2 3B</option>
              <option value="deepseek/deepseek-r1:free">DeepSeek R1</option>
            </select>
          </div>
          <div class="setting-item" style="flex-direction: row; align-items: center; gap: 10px; margin-top: 10px;">
            <input id="useAIRoute" type="checkbox" checked />
            <label for="useAIRoute">Enable AI Rewrite</label>
          </div>
        </div>
        <input id="variation" type="hidden" value="62"><input id="specificity" type="hidden" value="58"><input id="formal" type="hidden" value="68">
        <input id="flagWeakSpots" type="hidden" value="true"><input id="showDiff" type="hidden" value="true"><input id="preserveParagraphs" type="hidden" value="true">
        <select id="providerSelect" class="hidden"><option value="openrouter">OpenRouter</option></select>
      </details>
    </main>

    <section class="card">
      <div class="tabs">
        <button class="tab-btn active" id="btnDiff">Changes</button>
        <button class="tab-btn" id="btnClean">Clean Text</button>
      </div>

      <div id="diffView" class="diff">Results will appear here.</div>
      <textarea id="outputText" class="hidden" readonly></textarea>

      <div class="status-bar">
        <div>Score Improvement: <span id="scoreDelta" style="color: var(--good); font-weight: bold;">0</span></div>
        <div style="display: flex; gap: 15px;">
          <span id="copyBtn" style="cursor: pointer; color: var(--accent);">Copy</span>
          <span id="clearBtn" style="cursor: pointer;">Clear</span>
        </div>
      </div>
    </section>
  </div>

  <script>
    /* CORE LOGIC: This section preserves your original mechanism, 
       including the exact Worker API call structure.
    */
    const $ = (id) => document.getElementById(id);

    // Sync slider labels
    ["plainness", "hype"].forEach(id => {
      $(id).addEventListener("input", () => $(id + "Val").textContent = $(id).value);
    });

    // Scoring & Diff Logic (Simplified for this version but same principle)
    function countWords(t) { return (t.trim().match(/\b\w+\b/g) || []).length; }
    function scoreAiTics(t) { 
        const patterns = [/pivotal|crucial|significant/gi, /moreover|furthermore/gi, /not just|but also/gi];
        let s = 0; patterns.forEach(p => s += (t.match(p) || []).length);
        return s;
    }

    function diffWords(before, after) {
      const a = before.split(/(\s+)/), b = after.split(/(\s+)/);
      // Simple word-by-word comparison for visualization
      return b.map((word, i) => a.includes(word) ? word : `<ins>${word}</ins>`).join("");
    }

    // THE ORIGINAL API CALL MECHANISM
    async function rewriteViaWorker(input, settings) {
      const res = await fetch(settings.workerEndpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          text: input,
          model: settings.model,
          mode: settings.mode,
          controls: {
            plainness: settings.plainness,
            hype: settings.hype,
            variation: 62, // Defaults from original
            specificity: 58,
            formal: 68
          }
        })
      });
      if (!res.ok) throw new Error("Worker Error");
      return res.json();
    }

    $("humaniseBtn").addEventListener("click", async () => {
      const input = $("inputText").value;
      if (!input.trim()) return;

      const settings = {
        workerEndpoint: $("workerEndpoint").value,
        model: $("modelSelect").value,
        mode: $("modeSelect").value,
        plainness: $("plainness").value,
        hype: $("hype").value,
        useAI: $("useAIRoute").checked
      };

      $("humaniseBtn").disabled = true;
      $("humaniseBtn").textContent = "Processing...";
      $("statusLine").textContent = "Connecting to Worker...";

      try {
        let output = "";
        if (settings.useAI) {
            const data = await rewriteViaWorker(input, settings);
            output = data.output;
        } else {
            output = input.replace(/utilize/gi, "use").replace(/pivotal/gi, "important"); // Basic local fallback
        }

        const scoreBefore = scoreAiTics(input);
        const scoreAfter = scoreAiTics(output);

        $("outputText").value = output;
        $("diffView").innerHTML = diffWords(input, output);
        $("scoreDelta").textContent = `-${scoreBefore - scoreAfter}`;
        $("statusLine").textContent = "Done.";
      } catch (e) {
        $("statusLine").textContent = "Error: Check Endpoint/API";
        $("statusLine").style.color = "var(--bad)";
      } finally {
        $("humaniseBtn").disabled = false;
        $("humaniseBtn").textContent = "Humanise Text";
      }
    });

    // Tab Switching
    $("btnDiff").addEventListener("click", () => {
        $("diffView").classList.remove("hidden");
        $("outputText").classList.add("hidden");
        $("btnDiff").classList.add("active");
        $("btnClean").classList.remove("active");
    });
    $("btnClean").addEventListener("click", () => {
        $("outputText").classList.remove("hidden");
        $("diffView").classList.add("hidden");
        $("btnClean").classList.add("active");
        $("btnDiff").classList.remove("active");
    });

    $("copyBtn").addEventListener("click", () => {
        navigator.clipboard.writeText($("outputText").value);
        $("copyBtn").textContent = "Copied!";
        setTimeout(() => $("copyBtn").textContent = "Copy", 1500);
    });

    $("clearBtn").addEventListener("click", () => {
        $("inputText").value = "";
        $("outputText").value = "";
        $("diffView").innerHTML = "";
    });
  </script>
</body>
</html>
